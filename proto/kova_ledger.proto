syntax = "proto3";

package kova.ledger;

import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_package = "com.kova.grpc.ledger";

// KovaLedger — double-entry bookkeeping service.
//
// All balance queries and ledger postings go through this service. No other
// service queries kova_ledger_db directly. Callers must present a valid
// KOVA-internal JWT in the Authorization metadata header.
service KovaLedger {
  // PostEntry creates a double-entry ledger posting. The operation is
  // idempotent: submitting the same idempotency_key twice returns the
  // original entry without inserting a duplicate.
  //
  // Error codes:
  //   OK (0)                  Entry posted (or idempotent return of existing).
  //   INVALID_ARGUMENT (3)    amount <= 0, or debit_account_id == credit_account_id,
  //                           or unknown currency.
  //   ALREADY_EXISTS (6)      idempotency_key exists with a different payload_hash
  //                           (IDEMPOTENCY_MISMATCH).
  //   NOT_FOUND (5)           debit_account_id or credit_account_id does not exist.
  //   FAILED_PRECONDITION (9) Insufficient funds (balance would go below zero
  //                           if enforced at ledger layer).
  //   UNAUTHENTICATED (16)    Missing or invalid internal JWT.
  //   INTERNAL (13)           Unexpected database error.
  rpc PostEntry(PostEntryRequest) returns (PostEntryResponse);

  // GetBalance derives the current balance for an account by summing all
  // ledger entries. Result is never read from a stored balance column.
  //
  // Error codes:
  //   OK (0)                  Balance returned (zero if no entries exist).
  //   INVALID_ARGUMENT (3)    Unknown currency.
  //   UNAUTHENTICATED (16)    Missing or invalid internal JWT.
  //   INTERNAL (13)           Unexpected database error.
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);

  // GetStatement returns a cursor-paginated list of ledger entries for an
  // account. Uses keyset pagination — OFFSET is never used.
  //
  // Error codes:
  //   OK (0)                  Page returned (empty slice if no entries).
  //   INVALID_ARGUMENT (3)    limit > 100, malformed cursor, or unknown currency.
  //   UNAUTHENTICATED (16)    Missing or invalid internal JWT.
  //   INTERNAL (13)           Unexpected database error.
  rpc GetStatement(GetStatementRequest) returns (GetStatementResponse);
}

// ── PostEntry ────────────────────────────────────────────────────────────────

message PostEntryRequest {
  // UUID stored as 16 raw bytes (BINARY(16) in MySQL, UUIDv7 byte order).
  bytes debit_account_id = 1;

  // UUID stored as 16 raw bytes.
  bytes credit_account_id = 2;

  // Monetary amount as a decimal string mapping to MySQL DECIMAL(19,4).
  // Must be strictly positive. Example: "1250.0000".
  // Never use double or float for this field.
  string amount = 3;

  // ISO 4217 currency code. Accepted values: "NGN", "GBP", "USD", "KES".
  string currency = 4;

  // Caller-supplied idempotency key. UNIQUE constraint enforced in MySQL.
  // Recommended format: UUID v7 or a hash of the originating request.
  string idempotency_key = 5;

  // Optional: UUID of the payment this entry belongs to.
  // Empty bytes means this is a non-payment entry (fee, FX conversion, etc.).
  bytes payment_id = 6;

  // Optional: arbitrary JSON metadata stored with the entry (max 64 KB).
  string metadata_json = 7;
}

message PostEntryResponse {
  // UUID of the created (or existing idempotent) ledger entry.
  bytes entry_id = 1;

  // Whether this was an idempotent return of an existing entry.
  bool was_idempotent = 2;

  google.protobuf.Timestamp created_at = 3;
}

// ── GetBalance ───────────────────────────────────────────────────────────────

message GetBalanceRequest {
  // UUID stored as 16 raw bytes.
  bytes account_id = 1;

  // ISO 4217 currency code.
  string currency = 2;
}

message GetBalanceResponse {
  // UUID stored as 16 raw bytes.
  bytes account_id = 1;

  // ISO 4217 currency code.
  string currency = 2;

  // Derived balance as a decimal string mapping to MySQL DECIMAL(19,4).
  // Computed as SUM(credits) - SUM(debits). May be negative for internal
  // settlement accounts. Example: "5000.0000".
  // Never use double or float for this field.
  string balance = 3;

  // Total number of ledger entries that contributed to this balance.
  int64 entry_count = 4;

  // Timestamp of the most recent entry included in this balance.
  // Null if entry_count is zero.
  google.protobuf.Timestamp as_of = 5;
}

// ── GetStatement ─────────────────────────────────────────────────────────────

message GetStatementRequest {
  // UUID stored as 16 raw bytes.
  bytes account_id = 1;

  // ISO 4217 currency code. If empty, entries in all currencies are returned.
  string currency = 2;

  // Opaque cursor from a previous GetStatementResponse.next_cursor.
  // Empty string means "start from the most recent entry".
  string cursor = 3;

  // Maximum number of entries to return. Must be 1–100. Default: 20.
  uint32 limit = 4;

  // Optional: only return entries on or after this time.
  google.protobuf.Timestamp from_time = 5;

  // Optional: only return entries on or before this time.
  google.protobuf.Timestamp to_time = 6;
}

message GetStatementResponse {
  repeated LedgerEntryProto entries = 1;

  // Opaque cursor to pass in the next request. Empty if has_more is false.
  string next_cursor = 2;

  bool has_more = 3;
}

message LedgerEntryProto {
  // UUID stored as 16 raw bytes.
  bytes entry_id = 1;

  // UUID stored as 16 raw bytes.
  bytes debit_account_id = 2;

  // UUID stored as 16 raw bytes.
  bytes credit_account_id = 3;

  // Decimal string mapping to MySQL DECIMAL(19,4). Always positive.
  // Never use double or float for this field.
  string amount = 4;

  // ISO 4217 currency code.
  string currency = 5;

  string idempotency_key = 6;

  // Empty bytes if this entry is not associated with a payment.
  bytes payment_id = 7;

  string metadata_json = 8;

  google.protobuf.Timestamp created_at = 9;
}
